name: Atualizar dados & deploy

on:
  push:
    branches: [main]
  schedule:
    # ── Tudo (fundos CVM + breadth + alocador) 5x/dia, dias úteis ──────────────
    # Minutos quebrados (:07, :23…) evitam o descarte de crons no topo da hora,
    # que o GitHub trata como best-effort e pula quando a fila está cheia.
    # Horários em UTC; pregão B3 10:00–19:00 BRT = 13:00–22:00 UTC.
    - cron: "7 13 * * 1-5"    # ~10:07 BRT (abertura)
    - cron: "23 15 * * 1-5"   # ~12:23 BRT
    - cron: "7 17 * * 1-5"    # ~14:07 BRT
    - cron: "37 19 * * 1-5"   # ~16:37 BRT
    - cron: "23 21 * * 1-5"   # ~18:23 BRT (perto do fechamento)
  workflow_dispatch:

# Enfileira runs sobrepostos em vez de cancelar o que está no meio. Como o job da
# CVM pode levar ~30min, cancel-in-progress matava runs antes de terminar — agora
# eles esperam a vez (cancel-in-progress: false).
concurrency:
  group: main-deploy
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — Fundos CVM (roda em todos os 5 horários agendados, ou dispatch)
  # ════════════════════════════════════════════════════════════════════════════
  update-fundos:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (fundos)
        run: pip install requests pandas numpy yfinance pyarrow

      - name: Fetch CVM data e gera data.json + history.json
        run: python scripts/fetch_data.py

      - name: Commit dados de fundos
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/history.json
          git diff --cached --quiet || git commit -m "chore: update fund data $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — Breadth IBOV (roda em schedule e dispatch, não em push)
  # Aguarda update-fundos quando ambos estão no mesmo run (evita conflito de git)
  # ════════════════════════════════════════════════════════════════════════════
  update-breadth:
    runs-on: ubuntu-latest
    needs: [update-fundos]
    if: |
      always() &&
      (needs.update-fundos.result == 'success' ||
       needs.update-fundos.result == 'skipped') &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (breadth)
        run: pip install pandas numpy yfinance pyarrow requests

      - name: Gera breadth.json e ibov_price.json
        run: python scripts/fetch_breadth.py

      - name: Commit dados de breadth
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/breadth.json docs/ibov_price.json data/prices.parquet data/breadth.parquet data/ibov_price.parquet data/ibov_composition.py
          git diff --cached --quiet || git commit -m "chore: update breadth $(date -u +%Y-%m-%dT%H:%M)Z"
          git pull --rebase origin main
          git push
          
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2b — Breadth S&P 500 (mesma cadência do breadth IBOV; roda em paralelo)
  # ════════════════════════════════════════════════════════════════════════════
  update-breadth-us:
    runs-on: ubuntu-latest
    needs: [update-fundos]
    if: |
      always() &&
      (needs.update-fundos.result == 'success' ||
       needs.update-fundos.result == 'skipped') &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (breadth US)
        run: pip install pandas numpy yfinance pyarrow requests

      - name: Gera breadth_us.json
        run: python scripts/fetch_breadth_us.py

      - name: Commit dados de breadth US
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/breadth_us.json
          [ -f data/prices_us.parquet ] && git add data/prices_us.parquet
          git diff --cached --quiet || git commit -m "chore: update breadth US $(date -u +%Y-%m-%dT%H:%M)Z"
          git pull --rebase origin main
          git push

  alocador:
    runs-on: ubuntu-latest
    needs: [update-breadth, update-breadth-us]
    if: |
      always() &&
      (needs.update-breadth.result == 'success' || needs.update-breadth.result == 'skipped') &&
      (needs.update-breadth-us.result == 'success' || needs.update-breadth-us.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install requests pandas numpy yfinance
      - name: Calcula allocation.json
        run: |
          git pull --rebase origin main
          python scripts/allocator.py
      - name: Commit allocation.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/allocation.json
          [ -f docs/sp_ath.json ] && git add docs/sp_ath.json
          git diff --cached --quiet || git commit -m "chore: allocation $(date -u +%Y-%m-%d)"
          git pull --rebase origin main && git push
          
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3 — Deploy GitHub Pages
  # Em push: roda direto (sem depender dos jobs de dados)
  # Em schedule/dispatch: roda após alocador (que por sua vez espera os dois breadths)
  # ════════════════════════════════════════════════════════════════════════════
  deploy:
    runs-on: ubuntu-latest
    needs: [alocador]
    if: always() && (needs.alocador.result == 'success' || needs.alocador.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: false
